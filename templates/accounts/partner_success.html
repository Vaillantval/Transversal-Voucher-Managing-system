<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demande soumise — BonNet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0b1120;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(16,185,129,.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(59,130,246,.1) 0%, transparent 70%);
}
.success-card {
  position: relative; z-index: 1;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px;
  padding: 3rem 2.5rem;
  max-width: 480px; width: 100%;
  text-align: center;
  box-shadow: 0 25px 60px rgba(0,0,0,.5);
}
.success-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(16,185,129,.15);
  border: 2px solid rgba(16,185,129,.4);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 2rem; color: #34d399;
  margin-bottom: 1.5rem;
}
h1 { font-size: 1.6rem; font-weight: 800; color: #f1f5f9; margin-bottom: .75rem; }
p  { font-size: .95rem; color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
.btn-back {
  display: inline-flex; align-items: center; gap: .4rem;
  background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3);
  color: #93c5fd; border-radius: 8px; padding: .6rem 1.25rem;
  font-size: .9rem; font-weight: 600; text-decoration: none;
  transition: all .2s;
}
.btn-back:hover { background: rgba(59,130,246,.25); color: #bfdbfe; }
.footer { margin-top: 2rem; font-size: .75rem; color: #475569; }
</style>
</head>
<body>
<div class="success-card">
  <div class="success-icon"><i class="bi bi-check-lg"></i></div>
  <h1>Demande soumise !</h1>
  <p>
    Merci pour votre intérêt à rejoindre le réseau <strong style="color:#f1f5f9">BonNet</strong>.<br>
    Votre demande de partenariat est en cours d'examen. Vous recevrez une réponse par email
    dès qu'elle aura été traitée par notre équipe.
  </p>
  <a href="/accounts/login/" class="btn-back">
    <i class="bi bi-arrow-left-short"></i> Retour à la connexion
  </a>
</div>
<div class="footer">{{ config.footer|default:"© 2026 BonNet · Transversal" }}</div>
</body>
</html>
