<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion — BonNet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; }
.brand { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: .25rem; }
.brand span { color: #1A56DB; }
.btn-login { background: #1A56DB; border: none; padding: .75rem; font-size: 1rem; }
.btn-login:hover { background: #1140A6; }
</style>
</head>
<body>
<div class="login-card shadow-lg">
  <div class="brand">Bon<span>Net</span></div>
  <p class="text-center text-muted small mb-3">Gestion des vouchers WiFi</p>

  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-danger py-2">{{ message }}</div>
  {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Nom d'utilisateur</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Mot de passe</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-4 form-check">
      <input type="checkbox" name="remember_me" id="remember_me" class="form-check-input">
      <label for="remember_me" class="form-check-label text-muted small">Se souvenir de moi (30 jours)</label>
    </div>
    <button type="submit" class="btn btn-login btn-primary w-100 text-white rounded-3">
      Se connecter
    </button>
  </form>
</div>
</body>
</html>
